name: Deploy (canary)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag (git sha)
        id: vars
        run: |
          echo "sha=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push (linux/arm64)
        run: |
          IMAGE_URI="${{ secrets.ECR_REPOSITORY_URL }}:${{ steps.vars.outputs.sha }}"
          docker buildx build \
            --platform linux/arm64 \
            -t "$IMAGE_URI" \
            --push \
            .

      - name: Deploy via SSM Run Command (no SSH)
        run: |
          set -euo pipefail

          sudo apt-get update -y && sudo apt-get install -y jq

          INSTANCE_ID='${{ secrets.EC2_INSTANCE_ID }}'
          REGION='${{ secrets.AWS_REGION }}'
          ECR_REPO='${{ secrets.ECR_REPOSITORY_URL }}'
          ECR_REGISTRY='${{ secrets.ECR_REGISTRY }}'
          IMAGE_TAG='${{ steps.vars.outputs.sha }}'

          # Build a JSON array of commands for SSM (AWS-RunShellScript expects JSON)
          SCRIPT=$(cat <<'EOF'
          set -euo pipefail

          REGION="__REGION__"
          ECR_REPO="__ECR_REPO__"
          ECR_REGISTRY="__ECR_REGISTRY__"
          IMAGE_TAG="__IMAGE_TAG__"

          cd /opt/allrecords

          # Ensure deploy.env exists and contains only deploy-controlled vars
          if [ -f deploy.env ]; then
            grep -q '^ECR_REPOSITORY_URL=' deploy.env && sed -i "s|^ECR_REPOSITORY_URL=.*|ECR_REPOSITORY_URL=${ECR_REPO}|" deploy.env || echo "ECR_REPOSITORY_URL=${ECR_REPO}" >> deploy.env
            grep -q '^IMAGE_TAG=' deploy.env && sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" deploy.env || echo "IMAGE_TAG=${IMAGE_TAG}" >> deploy.env
          else
            {
              echo "ECR_REPOSITORY_URL=${ECR_REPO}"
              echo "IMAGE_TAG=${IMAGE_TAG}"
            } > deploy.env
          fi

          # docker compose variable substitution (e.g. image: ${ECR_REPOSITORY_URL}:${IMAGE_TAG})
          # reads from .env or process env, NOT from env_file. So keep a minimal .env for interpolation.
          {
            echo "ECR_REPOSITORY_URL=${ECR_REPO}"
            echo "IMAGE_TAG=${IMAGE_TAG}"
          } > .env

          # Ensure app.env exists (must be managed manually / via secrets tooling)
          if [ ! -f app.env ]; then
            echo "ERROR: /opt/allrecords/app.env not found. Create it with application environment variables (DB/Neo4j/etc)." >&2
            exit 1
          fi

          # Ensure docker compose is available
          if docker compose version >/dev/null 2>&1; then
            COMPOSE_CMD="docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD="docker-compose"
          else
            dnf install -y docker-compose-plugin >/dev/null 2>&1 || true
            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            else
              echo "ERROR: docker compose is not available (install docker-compose-plugin)" >&2
              exit 1
            fi
          fi

          # Login to ECR using ec2-user docker config (avoid writing to /root)
          sudo -u ec2-user -H bash -lc "aws ecr get-login-password --region '${REGION}' | docker login --username AWS --password-stdin '${ECR_REGISTRY}'"

          sudo -u ec2-user -H bash -lc "cd /opt/allrecords && ${COMPOSE_CMD} pull"
          sudo -u ec2-user -H bash -lc "cd /opt/allrecords && ${COMPOSE_CMD} up -d"
          EOF
          )

          SCRIPT=${SCRIPT//__REGION__/${REGION}}
          SCRIPT=${SCRIPT//__ECR_REPO__/${ECR_REPO}}
          SCRIPT=${SCRIPT//__ECR_REGISTRY__/${ECR_REGISTRY}}
          SCRIPT=${SCRIPT//__IMAGE_TAG__/${IMAGE_TAG}}

          CMDS_JSON=$(printf '%s\n' "$SCRIPT" | jq -R -s -c 'split("\n")[:-1]')

          aws ssm send-command \
            --region "$REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy allrecords backend: $IMAGE_TAG" \
            --parameters "commands=$CMDS_JSON" \
            --output json > ssm-send-command.json

          COMMAND_ID=$(cat ssm-send-command.json | jq -r '.Command.CommandId')
          echo "SSM CommandId: $COMMAND_ID"

          # Wait for completion but don't abort before we fetch stdout/stderr
          set +e
          aws ssm wait command-executed \
            --region "$REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"
          WAIT_RC=$?
          set -e

          INVOCATION=$(aws ssm get-command-invocation \
            --region "$REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status, StandardOutputContent:StandardOutputContent, StandardErrorContent:StandardErrorContent}' \
            --output json)

          echo "$INVOCATION" | jq .

          STATUS=$(echo "$INVOCATION" | jq -r '.Status')
          if [ "$STATUS" != "Success" ]; then
            echo "SSM command failed (status=$STATUS, waiter_rc=$WAIT_RC)" >&2
            exit 1
          fi

      - name: Canary health check
        run: |
          curl -fsS "http://${{ secrets.CANARY_DOMAIN }}/" >/dev/null
