name: Deploy (canary)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag (git sha)
        id: vars
        run: |
          echo "sha=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push (linux/arm64)
        run: |
          IMAGE_URI="${{ secrets.ECR_REPOSITORY_URL }}:${{ steps.vars.outputs.sha }}"
          docker buildx build \
            --platform linux/arm64 \
            -t "$IMAGE_URI" \
            --push \
            .

      - name: Deploy via SSM Run Command (no SSH)
        run: |
          set -euo pipefail

          INSTANCE_ID='${{ secrets.EC2_INSTANCE_ID }}'
          REGION='${{ secrets.AWS_REGION }}'
          ECR_REPO='${{ secrets.ECR_REPOSITORY_URL }}'
          ECR_REGISTRY='${{ secrets.ECR_REGISTRY }}'
          IMAGE_TAG='${{ steps.vars.outputs.sha }}'

          aws ssm send-command \
            --region "$REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy allrecords backend: $IMAGE_TAG" \
            --parameters commands="$(cat <<'CMDS'
          set -euo pipefail
          cd /opt/allrecords

          # Ensure .env exists and contains ECR_REPOSITORY_URL + IMAGE_TAG
          if [ -f .env ]; then
            grep -q '^ECR_REPOSITORY_URL=' .env && sed -i "s|^ECR_REPOSITORY_URL=.*|ECR_REPOSITORY_URL=$ECR_REPO|" .env || echo "ECR_REPOSITORY_URL=$ECR_REPO" >> .env
            grep -q '^IMAGE_TAG=' .env && sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$IMAGE_TAG/" .env || echo "IMAGE_TAG=$IMAGE_TAG" >> .env
          else
            {
              echo "ECR_REPOSITORY_URL=$ECR_REPO"
              echo "IMAGE_TAG=$IMAGE_TAG"
            } > .env
          fi

          aws ecr get-login-password --region "$REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

          docker compose pull
          docker compose up -d
          CMDS
          )" \
            --output json > ssm-send-command.json

          sudo apt-get update -y && sudo apt-get install -y jq
          COMMAND_ID=$(cat ssm-send-command.json | jq -r '.Command.CommandId')
          echo "SSM CommandId: $COMMAND_ID"

          aws ssm wait command-executed \
            --region "$REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          aws ssm get-command-invocation \
            --region "$REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status, StandardOutputContent:StandardOutputContent, StandardErrorContent:StandardErrorContent}' \
            --output json

      - name: Canary health check
        run: |
          curl -fsS "https://${{ secrets.CANARY_DOMAIN }}/" >/dev/null
